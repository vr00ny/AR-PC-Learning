<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>AR Assembly Background</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; }
        a-scene { display: block; width: 100% !important; height: 100% !important; }
        body > video, body > #arjs-video {
            position: absolute !important;
            top: 0 !important; left: 0 !important;
            width: 100% !important; height: 100% !important;
            object-fit: cover !important;
            z-index: 1 !important;
        }
        .status {
            position: fixed; top: 12px; left: 12px;
            background: rgba(11,15,23,0.85);
            color: #4fd1c5;
            padding: 5px 10px; border-radius: 5px;
            border: 1px solid rgba(79,209,197,0.25);
            font: 500 10px/1.2 "JetBrains Mono", monospace;
            letter-spacing: .05em; z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body>

<a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono; maxDetectionRate: 60; patternRatio: 0.5;"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true;">

    <a-marker preset="hiro"
              smooth="true" smoothCount="5"
              smoothTolerance="0.01" smoothThreshold="2">
        <!-- Маленький полупрозрачный куб как индикатор что маркер найден -->
        <a-box position="0 0.3 0" scale="0.5 0.5 0.5"
               material="color: #4fd1c5; opacity: 0.5; transparent: true"
               animation="property: rotation; to: 0 360 0; loop: true; dur: 4000"></a-box>
    </a-marker>

    <a-entity camera></a-entity>
</a-scene>

<div class="status" id="status">// SEARCHING…</div>

<script>
(function () {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;
    const orig = navigator.mediaDevices.getUserMedia.bind(navigator.mediaDevices);
    navigator.mediaDevices.getUserMedia = function (constraints) {
        const c = constraints || {};
        if (c.video) {
            const v = typeof c.video === 'object' ? Object.assign({}, c.video) : {};
            v.facingMode = { ideal: 'environment' };
            c.video = v;
        }
        return orig(c);
    };
})();

new MutationObserver(function () {
    const v = document.getElementById('arjs-video');
    if (!v) return;
    v.setAttribute('playsinline', '');
    v.setAttribute('webkit-playsinline', '');
    v.muted = true; v.playsInline = true;
    try { v.play && v.play().catch(function(){}); } catch (e) {}
}).observe(document.body, { childList: true, subtree: false });

const status = document.getElementById('status');
const marker = document.querySelector('a-marker');
marker.addEventListener('markerFound', function () { status.textContent = '// MARKER · LOCKED'; });
marker.addEventListener('markerLost',  function () { status.textContent = '// SEARCHING…'; });

window.addEventListener('beforeunload', function () {
    document.querySelectorAll('video').forEach(function (v) {
        const s = v.srcObject;
        if (s && s.getTracks) s.getTracks().forEach(function (t) { try { t.stop(); } catch (e) {} });
    });
});
</script>

</body>
</html>
