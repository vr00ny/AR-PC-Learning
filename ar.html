<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>AR Сборка</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; }

        /* A-Frame сцена и её canvas — растянуты на весь iframe, чтобы 3D-объекты
           рендерились НА видео, а не в правой полосе */
        a-scene { display: block; width: 100% !important; height: 100% !important; }
        a-scene .a-canvas, canvas.a-canvas {
            position: absolute !important;
            top: 0 !important; left: 0 !important;
            width: 100% !important; height: 100% !important;
            z-index: 2 !important;
        }
        body > video, body > #arjs-video, video#arjs-video {
            position: absolute !important;
            top: 0 !important; left: 0 !important;
            width: 100% !important; height: 100% !important;
            object-fit: cover !important;
            z-index: 1 !important;
        }
        .status {
            position: fixed; top: 12px; left: 12px;
            background: rgba(11,15,23,0.85);
            color: #e6ecf5;
            padding: 6px 12px; border-radius: 6px;
            border: 1px solid rgba(140,170,210,0.25);
            font: 500 11px/1.2 "JetBrains Mono", monospace;
            letter-spacing: .04em; z-index: 100;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        .exit-btn {
            position: fixed;
            top: calc(env(safe-area-inset-top, 0px) + 12px);
            right: calc(env(safe-area-inset-right, 0px) + 12px);
            z-index: 200;
            width: 44px; height: 44px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.25);
            background: rgba(11,15,23,0.78);
            color: #fff; font-size: 22px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .hint {
            position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
            background: rgba(11,15,23,0.85);
            color: #4fd1c5;
            padding: 8px 14px; border-radius: 8px;
            border: 1px solid rgba(79,209,197,0.35);
            font: 500 11px/1.4 "JetBrains Mono", monospace;
            z-index: 100; text-align: center;
            transition: opacity .3s;
            white-space: nowrap;
        }
        .hint.hidden { opacity: 0; pointer-events: none; }

        /* Прогресс сборки */
        .progress {
            position: fixed; top: 12px; right: 70px;
            z-index: 100;
            background: rgba(11,15,23,0.85);
            border: 1px solid rgba(79,209,197,0.30);
            padding: 6px 14px; border-radius: 8px;
            font: 700 13px/1 "Space Grotesk", system-ui, sans-serif;
            color: #4fd1c5;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        .progress span { color: #e6ecf5; font-weight: 500; font-size: 11px; margin-right: 6px; }

        /* Панель кнопок-деталей */
        .parts {
            position: fixed;
            bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
            left: 8px; right: 8px;
            z-index: 100;
            background: rgba(11,15,23,0.88);
            border: 1px solid rgba(140,170,210,0.25);
            border-radius: 14px;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }
        .parts button {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            padding: 10px 6px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(140,170,210,0.20);
            border-radius: 10px;
            color: #e6ecf5;
            font: 600 11px/1.1 "Inter", system-ui, sans-serif;
            cursor: pointer;
            transition: background .15s, border-color .15s, opacity .15s;
            text-align: center;
        }
        .parts button .ic { font-size: 20px; line-height: 1; }
        .parts button:active { transform: scale(0.97); }
        .parts button.done {
            background: rgba(124,217,146,0.18);
            border-color: rgba(124,217,146,0.6);
            color: #7cd992;
            opacity: 0.7;
        }
        .parts button.done .ic::after { content: " ✓"; }
        .parts button:disabled { cursor: default; }
        /* Следующая правильная деталь — бирюзовая пульсация */
        .parts button.next {
            border-color: rgba(79,209,197,0.85) !important;
            background: rgba(79,209,197,0.12) !important;
            box-shadow: 0 0 0 2px rgba(79,209,197,0.5), 0 0 16px rgba(79,209,197,0.4);
            animation: nextPulse 1.4s ease-in-out infinite;
        }
        @keyframes nextPulse {
            0%, 100% { box-shadow: 0 0 0 2px rgba(79,209,197,0.5), 0 0 16px rgba(79,209,197,0.35); }
            50%      { box-shadow: 0 0 0 4px rgba(79,209,197,0.85), 0 0 22px rgba(79,209,197,0.65); }
        }
        /* Ошибка — нажали не тот компонент */
        .parts button.wrong {
            background: rgba(255,107,107,0.40) !important;
            border-color: #ff6b6b !important;
            color: #fff !important;
            animation: wrongShake 0.45s;
        }
        @keyframes wrongShake {
            0%, 100% { transform: translateX(0); }
            20%      { transform: translateX(-5px); }
            40%      { transform: translateX(5px); }
            60%      { transform: translateX(-3px); }
            80%      { transform: translateX(3px); }
        }
        /* Под прогрессом подсказка какой компонент следующий */
        .next-hint {
            position: fixed;
            top: 46px; right: 70px;
            z-index: 100;
            background: rgba(79,209,197,0.18);
            border: 1px solid rgba(79,209,197,0.5);
            color: #4fd1c5;
            padding: 4px 10px; border-radius: 14px;
            font: 600 10.5px/1 "JetBrains Mono", monospace;
            letter-spacing: .05em;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            max-width: 60vw;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .next-hint span { opacity: 0.7; margin-right: 4px; }

        /* Информационная плашка про установленный компонент */
        .part-info {
            position: fixed;
            top: 56px; left: 8px; right: 8px;
            z-index: 150;
            background: rgba(11,15,23,0.94);
            border: 1px solid rgba(79,209,197,0.5);
            border-radius: 12px;
            padding: 12px 14px;
            color: #e6ecf5;
            font: 13px/1.45 "Inter", system-ui, sans-serif;
            transform: translateY(-12px);
            opacity: 0;
            transition: opacity .25s ease, transform .25s ease;
            pointer-events: none;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            max-height: 38vh; overflow-y: auto;
        }
        .part-info.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .part-info-title {
            font: 700 14px/1.2 "Space Grotesk", system-ui, sans-serif;
            color: #4fd1c5;
            margin-bottom: 6px;
            display: flex; align-items: center; gap: 8px;
        }
        .part-info-title .ic { font-size: 18px; }
        .part-info p { margin: 0 0 6px; }
        .part-info b { color: #4fd1c5; }
        .part-info-close {
            position: absolute; top: 6px; right: 6px;
            width: 26px; height: 26px;
            border: 0; border-radius: 50%;
            background: rgba(255,255,255,0.08);
            color: #e6ecf5;
            cursor: pointer;
            font-size: 14px;
        }

        /* Поздравление в конце */
        .done-msg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 300;
            background: rgba(11,15,23,0.95);
            border: 1px solid rgba(79,209,197,0.5);
            border-radius: 18px;
            padding: 24px 28px;
            text-align: center;
            box-shadow: 0 0 60px rgba(79,209,197,0.25);
            display: none;
            max-width: 80vw;
        }
        .done-msg.show { display: block; }
        .done-msg h2 {
            margin: 0 0 8px; color: #4fd1c5;
            font: 700 22px/1.2 "Space Grotesk", system-ui, sans-serif;
        }
        .done-msg p {
            margin: 0 0 16px; color: #e6ecf5;
            font: 400 14px/1.5 "Inter", system-ui, sans-serif;
        }
        .done-msg button {
            background: #4fd1c5; color: #072120;
            border: 0; padding: 10px 20px; border-radius: 22px;
            font: 700 13px/1 inherit; cursor: pointer;
        }
    </style>
</head>
<body>

<a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono; maxDetectionRate: 60; patternRatio: 0.5;"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true;">

    <a-marker preset="kanji"
              smooth="true" smoothCount="5"
              smoothTolerance="0.01" smoothThreshold="2">

        <!-- "ПОЛ" корпуса — лежит на маркере, имитирует открытую боковую крышку ATX -->
        <a-box position="0 0.005 0" scale="0.85 0.01 0.85"
               material="color: #1a2530; opacity: 0.55; transparent: true"></a-box>
        <!-- Задняя стенка корпуса -->
        <a-box position="0 0.2 -0.42" scale="0.85 0.4 0.01"
               material="color: #1a2530; opacity: 0.35; transparent: true"></a-box>
        <!-- Тонкая бирюзовая рамка пола -->
        <a-cylinder position=" 0.425 0.012  0   " rotation="90 0 0"  radius="0.005" height="0.85" color="#4fd1c5"></a-cylinder>
        <a-cylinder position="-0.425 0.012  0   " rotation="90 0 0"  radius="0.005" height="0.85" color="#4fd1c5"></a-cylinder>
        <a-cylinder position=" 0     0.012  0.425" rotation="0 0 90"  radius="0.005" height="0.85" color="#4fd1c5"></a-cylinder>
        <a-cylinder position=" 0     0.012 -0.425" rotation="0 0 90"  radius="0.005" height="0.85" color="#4fd1c5"></a-cylinder>

        <a-text value="PC CASE" position="0 0.55 -0.42" align="center"
                color="#4fd1c5" scale="0.18 0.18 0.18"></a-text>

        <!-- Реалистичная раскладка компонентов (вид сверху на распахнутый корпус):
             1. Материнка прислонена к задней стенке (большая плата)
             2. Процессор в центр-верх платы (где сокет)
             3. RAM правее процессора (DIMM-слоты)
             4. Видеокарта горизонтально ниже процессора (PCIe x16)
             5. SSD сбоку (отсек 2.5")
             6. БП внизу в углу (отсек PSU) -->

        <!-- Материнская плата — большой тонкий прямоугольник у задней стенки -->
        <a-box id="part-mb" position="-0.05 0.04 -0.18" scale="0.55 0.015 0.4"
               material="color: #5b8ef7; opacity: 0.95" visible="false"></a-box>

        <!-- Процессор — маленький золотой квадрат на плате (сокет) -->
        <a-box id="part-cpu" position="-0.12 0.07 -0.22" scale="0.09 0.04 0.09"
               material="color: #e8b65a; opacity: 0.95" visible="false"></a-box>

        <!-- RAM — две тонкие вертикальные планки справа от процессора (DIMM-слоты) -->
        <a-entity id="part-ram" visible="false">
            <a-box position=" 0.05 0.09 -0.22" scale="0.025 0.10 0.22"
                   material="color: #7cd992; opacity: 0.95"></a-box>
            <a-box position=" 0.10 0.09 -0.22" scale="0.025 0.10 0.22"
                   material="color: #7cd992; opacity: 0.95"></a-box>
        </a-entity>

        <!-- Видеокарта — длинная горизонтальная карта в нижней части платы (PCIe x16) -->
        <a-box id="part-gpu" position="-0.05 0.08 -0.05" scale="0.5 0.05 0.13"
               material="color: #a78bfa; opacity: 0.95" visible="false"></a-box>

        <!-- SSD — компактный прямоугольник в правом боковом отсеке -->
        <a-box id="part-ssd" position="0.32 0.05 0.10" scale="0.07 0.02 0.16"
               material="color: #e6ecf5; opacity: 0.95" visible="false"></a-box>

        <!-- Блок питания — крупный блок в нижнем-левом углу корпуса (отсек PSU) -->
        <a-box id="part-psu" position="-0.28 0.08 0.28" scale="0.28 0.13 0.22"
               material="color: #ff8c5a; opacity: 0.95" visible="false"></a-box>
    </a-marker>

    <a-entity camera></a-entity>
</a-scene>

<div class="status" id="status">// SEARCHING…</div>
<div class="hint" id="hint">🎯 Наведи камеру на маркер Kanji</div>
<div class="progress"><span>СОБРАНО</span><b id="progressN">0</b>/6</div>
<div class="next-hint" id="nextHint"><span>СЛЕДУЮЩИЙ:</span><b id="nextHintName">…</b></div>
<button class="exit-btn" id="exitBtn" aria-label="Выйти">✕</button>

<div class="part-info" id="partInfo">
    <button class="part-info-close" onclick="hideInfo()" aria-label="Закрыть">✕</button>
    <div class="part-info-title" id="partInfoTitle"></div>
    <div id="partInfoBody"></div>
</div>

<div class="parts" id="parts">
    <button data-part="mb"><div class="ic">🔧</div>Плата</button>
    <button data-part="cpu"><div class="ic">⚙️</div>Процессор</button>
    <button data-part="ram"><div class="ic">💾</div>RAM</button>
    <button data-part="gpu"><div class="ic">🎮</div>Видеокарта</button>
    <button data-part="ssd"><div class="ic">💿</div>SSD</button>
    <button data-part="psu"><div class="ic">🔌</div>Блок питания</button>
</div>

<div class="done-msg" id="doneMsg">
    <h2>🎉 ПК собран!</h2>
    <p>Все 6 компонентов установлены в корпус. Поворачивай телефон чтобы увидеть ПК со всех сторон.</p>
    <button onclick="resetAR()">Собрать заново</button>
</div>

<script>
// Принудительно задняя камера
(function () {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;
    const orig = navigator.mediaDevices.getUserMedia.bind(navigator.mediaDevices);
    navigator.mediaDevices.getUserMedia = function (constraints) {
        const c = constraints || {};
        if (c.video) {
            const v = typeof c.video === 'object' ? Object.assign({}, c.video) : {};
            v.facingMode = { ideal: 'environment' };
            c.video = v;
        }
        return orig(c);
    };
})();

// iOS Safari: playsinline на video + растягиваем canvas на весь экран
function fixArSizes() {
    const v = document.getElementById('arjs-video');
    if (v) {
        v.setAttribute('playsinline', '');
        v.setAttribute('webkit-playsinline', '');
        v.muted = true; v.playsInline = true;
        v.style.cssText =
            'position:absolute!important;top:0!important;left:0!important;' +
            'width:100%!important;height:100%!important;object-fit:cover!important;z-index:1!important;';
        try { v.play && v.play().catch(function () {}); } catch (e) {}
    }
    // Канвас A-Frame по умолчанию имеет aspect-ratio видео (обычно 4:3),
    // а экран телефона 9:16 — 3D-сцена занимает только часть экрана.
    // Принудительно растягиваем canvas на весь iframe.
    document.querySelectorAll('canvas.a-canvas').forEach(function (c) {
        c.style.cssText =
            'position:absolute!important;top:0!important;left:0!important;' +
            'width:100%!important;height:100%!important;z-index:2!important;';
    });
}

new MutationObserver(fixArSizes).observe(document.body, { childList: true, subtree: true });

// Подталкиваем A-Frame пересчитать viewport после загрузки и при ресайзе
function nudgeResize() {
    fixArSizes();
    window.dispatchEvent(new Event('resize'));
}
window.addEventListener('load', function () {
    setTimeout(nudgeResize, 300);
    setTimeout(nudgeResize, 1500);
    setTimeout(nudgeResize, 3500);
});
window.addEventListener('resize', fixArSizes);
window.addEventListener('orientationchange', function () { setTimeout(nudgeResize, 200); });

const status = document.getElementById('status');
const hint = document.getElementById('hint');
const marker = document.querySelector('a-marker');
marker.addEventListener('markerFound', function () {
    status.textContent = '// MARKER LOCKED';
    hint.classList.add('hidden');
});
marker.addEventListener('markerLost', function () {
    status.textContent = '// SEARCHING…';
    hint.classList.remove('hidden');
});

// Логика сборки. Порядок отражает реальный процесс:
// 1. Материнка — основа, ставится первой
// 2. Процессор — в сокет на материнке
// 3. RAM — в DIMM-слоты возле процессора
// 4. Блок питания — в свой отсек (теперь можно подключать питание)
// 5. Видеокарта — в PCIe и питание от БП
// 6. SSD — в M.2 на материнке или в отсек
const sequence = ['mb', 'cpu', 'ram', 'psu', 'gpu', 'ssd'];
let currentStep = 0;
const partNames = {
    mb: 'Материнская плата',
    cpu: 'Процессор',
    ram: 'RAM',
    psu: 'Блок питания',
    gpu: 'Видеокарта',
    ssd: 'SSD'
};

const parts = sequence;
const placed = new Set();
const progressN = document.getElementById('progressN');
const doneMsg = document.getElementById('doneMsg');
const nextHint = document.getElementById('nextHint');
const nextHintName = document.getElementById('nextHintName');

function updateNextHint() {
    document.querySelectorAll('[data-part]').forEach(function (b) { b.classList.remove('next'); });
    if (currentStep < sequence.length) {
        const id = sequence[currentStep];
        const btn = document.querySelector('[data-part="' + id + '"]');
        if (btn) btn.classList.add('next');
        nextHintName.textContent = partNames[id] || id;
        nextHint.style.display = '';
    } else {
        nextHint.style.display = 'none';
    }
}

// Информационные сводки про каждый компонент: куда ставится и как связан с другими
const partInfo = {
    mb: {
        icon: '🔧',
        title: 'Материнская плата',
        body:
            '<p><b>Где стоит:</b> крепится к боковой стенке корпуса винтами (стойками). Это «фундамент» всей сборки.</p>' +
            '<p><b>Связи:</b> в её сокет ставится <b>процессор</b>, в DIMM-слоты — <b>оперативная память</b>, в PCIe x16 — <b>видеокарта</b>. Через её дорожки все компоненты «общаются».</p>' +
            '<p><b>Питание:</b> от <b>блока питания</b> через разъём ATX 24-pin (главный) + 4/8-pin к процессору.</p>'
    },
    cpu: {
        icon: '⚙️',
        title: 'Процессор (CPU)',
        body:
            '<p><b>Где стоит:</b> в специальный сокет на материнской плате — в центре платы, ближе к верху. Закрепляется рычагом, сверху ставится кулер.</p>' +
            '<p><b>Зачем:</b> «мозг» компьютера — выполняет инструкции программ, обрабатывает данные.</p>' +
            '<p><b>Связи:</b> напрямую общается с <b>оперативной памятью</b> по высокоскоростной шине и с <b>чипсетом</b> материнки, который рулит остальной периферией.</p>'
    },
    ram: {
        icon: '💾',
        title: 'Оперативная память (RAM)',
        body:
            '<p><b>Где стоит:</b> в длинные слоты DIMM рядом с процессором — обычно 2 или 4 штуки.</p>' +
            '<p><b>Зачем:</b> быстрое временное хранилище. Когда запускаешь программу — она загружается из SSD в RAM, и процессор работает уже с RAM (она в десятки раз быстрее накопителя).</p>' +
            '<p><b>Совет:</b> ставь сразу 2 одинаковые планки в разные слоты — это активирует двухканальный режим и удваивает скорость памяти.</p>'
    },
    gpu: {
        icon: '🎮',
        title: 'Видеокарта (GPU)',
        body:
            '<p><b>Где стоит:</b> в слот <b>PCI-Express x16</b> на материнке — горизонтально, ниже процессора. К ней с задней стороны подключаются монитор и доп. питание от БП.</p>' +
            '<p><b>Зачем:</b> отвечает за вывод картинки и тяжёлые 3D-расчёты (игры, монтаж, нейросети).</p>' +
            '<p><b>Связи:</b> получает данные от процессора через PCIe-шину, питание — отдельным кабелем 6/8-pin от <b>блока питания</b>.</p>'
    },
    ssd: {
        icon: '💿',
        title: 'SSD-накопитель',
        body:
            '<p><b>Где стоит:</b> либо в слот M.2 прямо на материнке (NVMe SSD), либо в отсек 2.5" в корпусе с SATA-кабелем.</p>' +
            '<p><b>Зачем:</b> постоянное хранилище — здесь лежат операционная система, программы и файлы. В отличие от RAM, не теряет данные при выключении.</p>' +
            '<p><b>Связи:</b> NVMe SSD общается с процессором напрямую через PCIe (очень быстро). SATA — через чипсет материнки.</p>'
    },
    psu: {
        icon: '🔌',
        title: 'Блок питания (PSU)',
        body:
            '<p><b>Где стоит:</b> в специальный отсек снизу или сверху корпуса. Вентилятор обычно смотрит наружу/вниз.</p>' +
            '<p><b>Зачем:</b> преобразует переменный ток 220 В из розетки в постоянный 12/5/3.3 В для всех компонентов.</p>' +
            '<p><b>Связи:</b> питает <b>материнку</b> (ATX 24-pin), <b>процессор</b> (4/8-pin EPS), <b>видеокарту</b> (6/8-pin PCIe), накопители (SATA-power).</p>'
    }
};

const infoBox = document.getElementById('partInfo');
const infoTitle = document.getElementById('partInfoTitle');
const infoBody = document.getElementById('partInfoBody');
let infoTimer = null;
function showInfo(id) {
    const data = partInfo[id];
    if (!data) return;
    infoTitle.innerHTML = '<span class="ic">' + data.icon + '</span>' + data.title;
    infoBody.innerHTML = data.body;
    infoBox.classList.add('show');
    if (infoTimer) clearTimeout(infoTimer);
    infoTimer = setTimeout(hideInfo, 8000);
}
function hideInfo() {
    infoBox.classList.remove('show');
    if (infoTimer) { clearTimeout(infoTimer); infoTimer = null; }
}

// Двойная установка видимости: attribute + Three.js object3D.
// setAttribute('visible', 'true') в A-Frame не всегда пропагируется на детей,
// особенно когда entity — обёртка с a-box/a-text внутри.
function setPartVisible(id, on) {
    const el = document.getElementById('part-' + id);
    if (!el) return;
    const apply = function () {
        el.setAttribute('visible', on ? 'true' : 'false');
        if (el.object3D) {
            el.object3D.visible = !!on;
            el.object3D.traverse(function (o) { o.visible = !!on; });
        }
        el.querySelectorAll('*').forEach(function (child) {
            child.setAttribute('visible', on ? 'true' : 'false');
            if (child.object3D) child.object3D.visible = !!on;
        });
    };
    // Если object3D ещё не создан — подождём loaded
    if (el.object3D) apply();
    else el.addEventListener('loaded', apply, { once: true });
}

document.querySelectorAll('[data-part]').forEach(function (btn) {
    btn.onclick = function () {
        const id = btn.dataset.part;

        // Уже установлен — показываем инфо
        if (placed.has(id)) { showInfo(id); return; }

        // Не та деталь в последовательности — мигаем красным
        const expected = sequence[currentStep];
        if (id !== expected) {
            btn.classList.add('wrong');
            setTimeout(function () { btn.classList.remove('wrong'); }, 600);
            return;
        }

        // Правильная очередь — устанавливаем
        placed.add(id);
        currentStep++;
        setPartVisible(id, true);
        showInfo(id);
        btn.classList.add('done');
        progressN.textContent = placed.size;
        updateNextHint();

        if (placed.size === parts.length) {
            setTimeout(function () { doneMsg.classList.add('show'); }, 600);
        }
    };
});

// Инициализация подсказки
updateNextHint();

function resetAR() {
    placed.clear();
    currentStep = 0;
    parts.forEach(function (id) { setPartVisible(id, false); });
    document.querySelectorAll('[data-part]').forEach(function (b) {
        b.classList.remove('done', 'wrong', 'next');
    });
    progressN.textContent = '0';
    doneMsg.classList.remove('show');
    hideInfo();
    updateNextHint();
}

document.getElementById('exitBtn').onclick = function () {
    try { parent.postMessage({ type: 'ar-close' }, '*'); } catch (e) {}
};

window.addEventListener('beforeunload', function () {
    document.querySelectorAll('video').forEach(function (v) {
        const s = v.srcObject;
        if (s && s.getTracks) s.getTracks().forEach(function (t) { try { t.stop(); } catch (e) {} });
    });
});
</script>
