<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>AR Сборка</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; }
        a-scene { display: block; width: 100% !important; height: 100% !important; }
        body > video, body > #arjs-video {
            position: absolute !important;
            top: 0 !important; left: 0 !important;
            width: 100% !important; height: 100% !important;
            object-fit: cover !important;
            z-index: 1 !important;
        }
        .status {
            position: fixed; top: 12px; left: 12px;
            background: rgba(11,15,23,0.85);
            color: #e6ecf5;
            padding: 6px 12px; border-radius: 6px;
            border: 1px solid rgba(140,170,210,0.25);
            font: 500 11px/1.2 "JetBrains Mono", monospace;
            letter-spacing: .04em; z-index: 100;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        .exit-btn {
            position: fixed;
            top: calc(env(safe-area-inset-top, 0px) + 12px);
            right: calc(env(safe-area-inset-right, 0px) + 12px);
            z-index: 200;
            width: 44px; height: 44px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.25);
            background: rgba(11,15,23,0.78);
            color: #fff; font-size: 22px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .hint {
            position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
            background: rgba(11,15,23,0.85);
            color: #4fd1c5;
            padding: 8px 14px; border-radius: 8px;
            border: 1px solid rgba(79,209,197,0.35);
            font: 500 11px/1.4 "JetBrains Mono", monospace;
            z-index: 100; text-align: center;
            transition: opacity .3s;
            white-space: nowrap;
        }
        .hint.hidden { opacity: 0; pointer-events: none; }

        /* Прогресс сборки */
        .progress {
            position: fixed; top: 12px; right: 70px;
            z-index: 100;
            background: rgba(11,15,23,0.85);
            border: 1px solid rgba(79,209,197,0.30);
            padding: 6px 14px; border-radius: 8px;
            font: 700 13px/1 "Space Grotesk", system-ui, sans-serif;
            color: #4fd1c5;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        .progress span { color: #e6ecf5; font-weight: 500; font-size: 11px; margin-right: 6px; }

        /* Панель кнопок-деталей */
        .parts {
            position: fixed;
            bottom: calc(env(safe-area-inset-bottom, 0px) + 12px);
            left: 8px; right: 8px;
            z-index: 100;
            background: rgba(11,15,23,0.88);
            border: 1px solid rgba(140,170,210,0.25);
            border-radius: 14px;
            padding: 10px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
        }
        .parts button {
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            padding: 10px 6px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(140,170,210,0.20);
            border-radius: 10px;
            color: #e6ecf5;
            font: 600 11px/1.1 "Inter", system-ui, sans-serif;
            cursor: pointer;
            transition: background .15s, border-color .15s, opacity .15s;
            text-align: center;
        }
        .parts button .ic { font-size: 20px; line-height: 1; }
        .parts button:active { transform: scale(0.97); }
        .parts button.done {
            background: rgba(124,217,146,0.18);
            border-color: rgba(124,217,146,0.6);
            color: #7cd992;
            opacity: 0.7;
        }
        .parts button.done .ic::after { content: " ✓"; }
        .parts button:disabled { cursor: default; }

        /* Поздравление в конце */
        .done-msg {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 300;
            background: rgba(11,15,23,0.95);
            border: 1px solid rgba(79,209,197,0.5);
            border-radius: 18px;
            padding: 24px 28px;
            text-align: center;
            box-shadow: 0 0 60px rgba(79,209,197,0.25);
            display: none;
            max-width: 80vw;
        }
        .done-msg.show { display: block; }
        .done-msg h2 {
            margin: 0 0 8px; color: #4fd1c5;
            font: 700 22px/1.2 "Space Grotesk", system-ui, sans-serif;
        }
        .done-msg p {
            margin: 0 0 16px; color: #e6ecf5;
            font: 400 14px/1.5 "Inter", system-ui, sans-serif;
        }
        .done-msg button {
            background: #4fd1c5; color: #072120;
            border: 0; padding: 10px 20px; border-radius: 22px;
            font: 700 13px/1 inherit; cursor: pointer;
        }
    </style>
</head>
<body>

<a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono; maxDetectionRate: 60; patternRatio: 0.5;"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true;">

    <a-marker preset="kanji"
              smooth="true" smoothCount="5"
              smoothTolerance="0.01" smoothThreshold="2">

        <!-- Виртуальный КОРПУС ПК — большой полупрозрачный бокс над маркером.
             Виден сразу как только маркер пойман. -->
        <a-box position="0 0.4 0" scale="1.6 0.8 1.1"
               material="color: #4fd1c5; opacity: 0.12; transparent: true; side: double"></a-box>
        <!-- Чёткие рёбра корпуса (12 цилиндров) — без wireframe, чтобы было крупно видно -->
        <a-entity position="0 0.4 0">
            <!-- 4 нижних ребра -->
            <a-cylinder position="0 -0.4 0.55" rotation="0 0 90" radius="0.012" height="1.6" color="#4fd1c5"></a-cylinder>
            <a-cylinder position="0 -0.4 -0.55" rotation="0 0 90" radius="0.012" height="1.6" color="#4fd1c5"></a-cylinder>
            <a-cylinder position="0.8 -0.4 0" rotation="90 0 0" radius="0.012" height="1.1" color="#4fd1c5"></a-cylinder>
            <a-cylinder position="-0.8 -0.4 0" rotation="90 0 0" radius="0.012" height="1.1" color="#4fd1c5"></a-cylinder>
            <!-- 4 верхних ребра -->
            <a-cylinder position="0 0.4 0.55" rotation="0 0 90" radius="0.012" height="1.6" color="#4fd1c5"></a-cylinder>
            <a-cylinder position="0 0.4 -0.55" rotation="0 0 90" radius="0.012" height="1.6" color="#4fd1c5"></a-cylinder>
            <a-cylinder position="0.8 0.4 0" rotation="90 0 0" radius="0.012" height="1.1" color="#4fd1c5"></a-cylinder>
            <a-cylinder position="-0.8 0.4 0" rotation="90 0 0" radius="0.012" height="1.1" color="#4fd1c5"></a-cylinder>
            <!-- 4 вертикальных ребра -->
            <a-cylinder position="0.8 0 0.55" radius="0.012" height="0.8" color="#4fd1c5"></a-cylinder>
            <a-cylinder position="-0.8 0 0.55" radius="0.012" height="0.8" color="#4fd1c5"></a-cylinder>
            <a-cylinder position="0.8 0 -0.55" radius="0.012" height="0.8" color="#4fd1c5"></a-cylinder>
            <a-cylinder position="-0.8 0 -0.55" radius="0.012" height="0.8" color="#4fd1c5"></a-cylinder>
        </a-entity>
        <a-text value="PC CASE" position="0 0.95 0" align="center"
                color="#4fd1c5" scale="0.25 0.25 0.25"></a-text>

        <!-- Детали в виде ярких цветных блоков — гарантированно видны на iOS Safari -->

        <!-- Материнка — большая плоская плата на дне корпуса -->
        <a-entity id="part-mb" visible="false">
            <a-box position="0 0.07 0" scale="1.3 0.04 0.65"
                   material="color: #5b8ef7; opacity: 0.95"></a-box>
            <a-text value="MB" position="0 0.11 0" align="center"
                    color="#fff" scale="0.18 0.18 0.18"></a-text>
        </a-entity>

        <!-- Процессор — маленький золотой квадрат на плате слева -->
        <a-entity id="part-cpu" visible="false">
            <a-box position="-0.35 0.13 -0.1" scale="0.18 0.05 0.18"
                   material="color: #e8b65a; opacity: 0.95"></a-box>
            <a-text value="CPU" position="-0.35 0.18 -0.1" align="center"
                    color="#fff" scale="0.1 0.1 0.1"></a-text>
        </a-entity>

        <!-- RAM — две зелёные длинные полоски справа от CPU -->
        <a-entity id="part-ram" visible="false">
            <a-box position="0.05 0.13 -0.1" scale="0.05 0.12 0.5"
                   material="color: #7cd992; opacity: 0.95"></a-box>
            <a-box position="0.15 0.13 -0.1" scale="0.05 0.12 0.5"
                   material="color: #7cd992; opacity: 0.95"></a-box>
            <a-text value="RAM" position="0.1 0.22 -0.1" align="center"
                    color="#fff" scale="0.1 0.1 0.1"></a-text>
        </a-entity>

        <!-- Видеокарта — длинный фиолетовый блок горизонтально -->
        <a-entity id="part-gpu" visible="false">
            <a-box position="0 0.13 0.18" scale="0.95 0.06 0.18"
                   material="color: #a78bfa; opacity: 0.95"></a-box>
            <a-text value="GPU" position="0 0.18 0.18" align="center"
                    color="#fff" scale="0.12 0.12 0.12"></a-text>
        </a-entity>

        <!-- SSD — маленький белый прямоугольник на боковой стенке -->
        <a-entity id="part-ssd" visible="false">
            <a-box position="0.6 0.3 0.3" scale="0.08 0.15 0.22"
                   material="color: #e6ecf5; opacity: 0.95"></a-box>
            <a-text value="SSD" position="0.6 0.42 0.3" align="center"
                    color="#000" scale="0.08 0.08 0.08"></a-text>
        </a-entity>

        <!-- Блок питания — оранжевый куб сверху-справа -->
        <a-entity id="part-psu" visible="false">
            <a-box position="0.5 0.6 -0.3" scale="0.5 0.3 0.4"
                   material="color: #ff8c5a; opacity: 0.95"></a-box>
            <a-text value="PSU" position="0.5 0.78 -0.3" align="center"
                    color="#fff" scale="0.12 0.12 0.12"></a-text>
        </a-entity>
    </a-marker>

    <a-entity camera></a-entity>
</a-scene>

<div class="status" id="status">// SEARCHING…</div>
<div class="hint" id="hint">🎯 Наведи камеру на маркер Kanji</div>
<div class="progress"><span>СОБРАНО</span><b id="progressN">0</b>/6</div>
<button class="exit-btn" id="exitBtn" aria-label="Выйти">✕</button>

<div class="parts" id="parts">
    <button data-part="mb"><div class="ic">🔧</div>Плата</button>
    <button data-part="cpu"><div class="ic">⚙️</div>Процессор</button>
    <button data-part="ram"><div class="ic">💾</div>RAM</button>
    <button data-part="gpu"><div class="ic">🎮</div>Видеокарта</button>
    <button data-part="ssd"><div class="ic">💿</div>SSD</button>
    <button data-part="psu"><div class="ic">🔌</div>Блок питания</button>
</div>

<div class="done-msg" id="doneMsg">
    <h2>🎉 ПК собран!</h2>
    <p>Все 6 компонентов установлены в корпус. Поворачивай телефон чтобы увидеть ПК со всех сторон.</p>
    <button onclick="resetAR()">Собрать заново</button>
</div>

<script>
// Принудительно задняя камера
(function () {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;
    const orig = navigator.mediaDevices.getUserMedia.bind(navigator.mediaDevices);
    navigator.mediaDevices.getUserMedia = function (constraints) {
        const c = constraints || {};
        if (c.video) {
            const v = typeof c.video === 'object' ? Object.assign({}, c.video) : {};
            v.facingMode = { ideal: 'environment' };
            c.video = v;
        }
        return orig(c);
    };
})();

// iOS Safari: playsinline на video
new MutationObserver(function () {
    const v = document.getElementById('arjs-video');
    if (!v) return;
    v.setAttribute('playsinline', '');
    v.setAttribute('webkit-playsinline', '');
    v.muted = true; v.playsInline = true;
    try { v.play && v.play().catch(function () {}); } catch (e) {}
}).observe(document.body, { childList: true, subtree: false });

const status = document.getElementById('status');
const hint = document.getElementById('hint');
const marker = document.querySelector('a-marker');
marker.addEventListener('markerFound', function () {
    status.textContent = '// MARKER LOCKED';
    hint.classList.add('hidden');
});
marker.addEventListener('markerLost', function () {
    status.textContent = '// SEARCHING…';
    hint.classList.remove('hidden');
});

// Логика сборки
const parts = ['mb', 'cpu', 'ram', 'gpu', 'ssd', 'psu'];
const placed = new Set();
const progressN = document.getElementById('progressN');
const doneMsg = document.getElementById('doneMsg');

document.querySelectorAll('[data-part]').forEach(function (btn) {
    btn.onclick = function () {
        const id = btn.dataset.part;
        if (placed.has(id)) return;
        placed.add(id);
        const el = document.getElementById('part-' + id);
        if (el) el.setAttribute('visible', 'true');
        btn.classList.add('done');
        btn.disabled = true;
        progressN.textContent = placed.size;
        if (placed.size === parts.length) {
            setTimeout(function () { doneMsg.classList.add('show'); }, 400);
        }
    };
});

function resetAR() {
    placed.clear();
    parts.forEach(function (id) {
        const el = document.getElementById('part-' + id);
        if (el) el.setAttribute('visible', 'false');
    });
    document.querySelectorAll('[data-part]').forEach(function (b) {
        b.classList.remove('done');
        b.disabled = false;
    });
    progressN.textContent = '0';
    doneMsg.classList.remove('show');
}

document.getElementById('exitBtn').onclick = function () {
    try { parent.postMessage({ type: 'ar-close' }, '*'); } catch (e) {}
};

window.addEventListener('beforeunload', function () {
    document.querySelectorAll('video').forEach(function (v) {
        const s = v.srcObject;
        if (s && s.getTracks) s.getTracks().forEach(function (t) { try { t.stop(); } catch (e) {} });
    });
});
</script>

</body>
</html>
