<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>AR</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        html, body { margin: 0; padding: 0; height: 100%; width: 100%; background: #000; overflow: hidden; }
        a-scene { display: block; width: 100% !important; height: 100% !important; }
        body > video, body > #arjs-video {
            position: absolute !important;
            top: 0 !important; left: 0 !important;
            width: 100% !important; height: 100% !important;
            object-fit: cover !important;
            z-index: 1 !important;
        }
        .status {
            position: fixed; top: 14px; left: 14px;
            background: rgba(11,15,23,0.85);
            color: #e6ecf5;
            padding: 6px 12px; border-radius: 6px;
            border: 1px solid rgba(140,170,210,0.25);
            font: 500 11px/1.2 "JetBrains Mono", monospace;
            letter-spacing: .04em; z-index: 100;
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
        }
        .exit-btn {
            position: fixed;
            top: calc(env(safe-area-inset-top, 0px) + 14px);
            right: calc(env(safe-area-inset-right, 0px) + 14px);
            z-index: 200;
            width: 46px; height: 46px;
            border-radius: 50%;
            border: 1px solid rgba(255,255,255,0.25);
            background: rgba(11,15,23,0.78);
            color: #fff; font-size: 22px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        .hint {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(11,15,23,0.85);
            color: #4fd1c5;
            padding: 10px 16px; border-radius: 10px;
            border: 1px solid rgba(79,209,197,0.35);
            font: 500 11px/1.4 "JetBrains Mono", monospace;
            z-index: 100; text-align: center;
            transition: opacity .3s;
        }
        .hint.hidden { opacity: 0; pointer-events: none; }
        .controls {
            position: fixed; bottom: calc(env(safe-area-inset-bottom, 0px) + 16px);
            left: 50%; transform: translateX(-50%);
            display: flex; gap: 6px;
            background: rgba(11,15,23,0.85);
            padding: 6px; border-radius: 28px;
            border: 1px solid rgba(140,170,210,0.25);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 100;
            max-width: calc(100vw - 28px); overflow-x: auto;
        }
        .controls button {
            background: transparent; color: #e6ecf5;
            border: 0; padding: 8px 14px; border-radius: 20px;
            font: 600 11px/1 "Inter", system-ui, sans-serif;
            cursor: pointer; white-space: nowrap;
        }
        .controls button.active { background: #4fd1c5; color: #072120; }
    </style>
</head>
<body>

<a-scene
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono; maxDetectionRate: 60; patternRatio: 0.5;"
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; antialias: true; alpha: true;">

    <a-marker preset="hiro"
              smooth="true" smoothCount="5"
              smoothTolerance="0.01" smoothThreshold="2">
        <!-- Маленький индикатор-куб ровно на маркере: видно когда маркер пойман -->
        <a-box id="lockedIndicator" position="0 0.02 0" scale="0.1 0.02 0.1"
               material="color: #4fd1c5; opacity: 0.6; transparent: true"></a-box>

        <!-- Модели — плоско лежат на маркере. По умолчанию видна материнка -->
        <a-entity id="model-mb"
                  gltf-model="assets/models/motherboard.glb"
                  scale="0.25 0.25 0.25"
                  rotation="-90 0 0"
                  position="0 0.01 0"></a-entity>
        <a-entity id="model-gpu"
                  gltf-model="assets/models/gpu.glb"
                  scale="0.18 0.18 0.18"
                  rotation="-90 0 0"
                  position="0 0.01 0"
                  visible="false"></a-entity>
        <a-entity id="model-ram"
                  gltf-model="assets/models/ram.glb"
                  scale="0.2 0.2 0.2"
                  rotation="-90 0 0"
                  position="0 0.01 0"
                  visible="false"></a-entity>
        <a-entity id="model-ssd"
                  gltf-model="assets/models/ssd.glb"
                  scale="0.25 0.25 0.25"
                  rotation="-90 0 0"
                  position="0 0.01 0"
                  visible="false"></a-entity>
        <a-entity id="model-psu"
                  gltf-model="assets/models/psu.glb"
                  scale="0.2 0.2 0.2"
                  rotation="-90 0 0"
                  position="0 0.01 0"
                  visible="false"></a-entity>
    </a-marker>

    <a-entity camera></a-entity>
</a-scene>

<div class="status" id="status">// SEARCHING…</div>
<div class="hint" id="hint">🎯 Наведи камеру на маркер Hiro</div>
<button class="exit-btn" id="exitBtn" aria-label="Выйти">✕</button>

<div class="controls" id="controls">
    <button data-id="mb" class="active">🔧 Плата</button>
    <button data-id="gpu">🎮 GPU</button>
    <button data-id="ram">💾 RAM</button>
    <button data-id="ssd">💿 SSD</button>
    <button data-id="psu">🔌 БП</button>
</div>

<script>
// Принудительно задняя камера (иначе iPhone Safari может открыть переднюю)
(function () {
    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return;
    const orig = navigator.mediaDevices.getUserMedia.bind(navigator.mediaDevices);
    navigator.mediaDevices.getUserMedia = function (constraints) {
        const c = constraints || {};
        if (c.video) {
            const v = typeof c.video === 'object' ? Object.assign({}, c.video) : {};
            v.facingMode = { ideal: 'environment' };
            c.video = v;
        }
        return orig(c);
    };
})();

// iOS Safari: video AR.js должно играть inline
new MutationObserver(function () {
    const v = document.getElementById('arjs-video');
    if (!v) return;
    v.setAttribute('playsinline', '');
    v.setAttribute('webkit-playsinline', '');
    v.muted = true; v.playsInline = true;
    try { v.play && v.play().catch(function () {}); } catch (e) {}
}).observe(document.body, { childList: true, subtree: false });

const status = document.getElementById('status');
const hint = document.getElementById('hint');
const marker = document.querySelector('a-marker');
marker.addEventListener('markerFound', function () {
    status.textContent = '// MARKER · LOCKED';
    hint.classList.add('hidden');
});
marker.addEventListener('markerLost', function () {
    status.textContent = '// SEARCHING…';
    hint.classList.remove('hidden');
});

// Переключение моделей
const modelIds = ['mb', 'gpu', 'ram', 'ssd', 'psu'];
document.getElementById('controls').addEventListener('click', function (e) {
    const btn = e.target.closest('button');
    if (!btn) return;
    const targetId = btn.dataset.id;
    modelIds.forEach(function (id) {
        const el = document.getElementById('model-' + id);
        if (el) el.setAttribute('visible', id === targetId ? 'true' : 'false');
    });
    document.querySelectorAll('#controls button').forEach(function (b) {
        b.classList.toggle('active', b.dataset.id === targetId);
    });
});

document.getElementById('exitBtn').onclick = function () {
    try { parent.postMessage({ type: 'ar-close' }, '*'); } catch (e) {}
};

window.addEventListener('beforeunload', function () {
    document.querySelectorAll('video').forEach(function (v) {
        const s = v.srcObject;
        if (s && s.getTracks) s.getTracks().forEach(function (t) { try { t.stop(); } catch (e) {} });
    });
});
</script>

</body>
</html>
